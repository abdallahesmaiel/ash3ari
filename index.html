<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أشعاري - منصة الشعر العربي الأصيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Reem+Kufi:wght@400;600;700&family=El+Messiri:wght@400;600;700&family=Lateef:wght@400;600;700&family=Aref+Ruqaa:wght@400;700&family=Harmattan:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #8B4513; --primary-dark: #6B3410; --secondary: #D4A574;
            --gold: #C5A572; --dark: #1A1A1A; --light: #FDF5E6; --white: #FFFFFF;
            --gray: #6B7280; --red: #DC2626; --green: #059669;
            --gradient-1: linear-gradient(135deg, #8B4513 0%, #D4A574 100%);
            --gradient-2: linear-gradient(135deg, #FDF5E6 0%, #FAEBD7 100%);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.15);
            --shadow-xl: 0 20px 50px rgba(0,0,0,0.2);
            --radius-sm: 8px; --radius-md: 12px; --radius-lg: 20px; --radius-xl: 28px;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1810 50%, #1a1a1a 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px; position: relative; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(139,69,19,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 50%, rgba(212,165,116,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 50% 0%, rgba(197,165,114,0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        .container {
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            border-radius: var(--radius-xl); box-shadow: var(--shadow-xl);
            width: 100%; max-width: 480px; padding: 40px;
            position: relative; border: 1px solid rgba(139,69,19,0.2);
        }
        .logo-section { text-align: center; margin-bottom: 40px; }
        .logo-icon {
            width: 80px; height: 80px; background: var(--gradient-1); border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 15px; box-shadow: 0 10px 30px rgba(139,69,19,0.3);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
        .logo-icon i { font-size: 35px; color: white; }

        .logo-text {
            font-family: 'Reem Kufi', 'Aref Ruqaa', 'Amiri', serif;
            font-size: 42px; font-weight: 700;
            background: var(--gradient-1); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 5px; letter-spacing: 1.5px;
            text-shadow: 0 2px 10px rgba(139,69,19,0.1);
        }
        .logo-subtitle {
            font-family: 'El Messiri', 'Harmattan', 'Cairo', sans-serif;
            color: var(--gray); font-size: 16px; letter-spacing: 1px; word-spacing: 2px;
        }
        .tabs { display: flex; background: #f3f4f6; border-radius: var(--radius-lg); padding: 4px; margin-bottom: 30px; }
        .tab {
            flex: 1; padding: 12px; text-align: center; cursor: pointer;
            border-radius: var(--radius-md); transition: all 0.3s ease;
            font-weight: 600; font-size: 15px; color: var(--gray);
            font-family: 'Cairo', 'El Messiri', sans-serif; letter-spacing: 0.5px;
        }
        .tab.active { background: var(--gradient-1); color: white; box-shadow: var(--shadow-md); font-weight: 700; }
        .form { display: none; animation: fadeIn 0.5s ease; }
        .form.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block; margin-bottom: 8px; font-weight: 600;
            color: var(--dark); font-size: 15px;
            font-family: 'Cairo', 'El Messiri', sans-serif; letter-spacing: 0.3px;
        }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper .input-icon {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: var(--gray); font-size: 16px; z-index: 2; pointer-events: none;
        }
        .input-wrapper input {
            width: 100%; padding: 14px 42px 14px 45px; border: 2px solid #e5e7eb;
            border-radius: var(--radius-md); font-size: 15px;
            font-family: 'Cairo', sans-serif; transition: all 0.3s ease; background: white;
            letter-spacing: 0.3px;
        }
        .input-wrapper input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139,69,19,0.1); }
        .input-wrapper input::placeholder { font-family: 'Cairo', sans-serif; color: #9CA3AF; font-size: 14px; }

        .password-toggle {
            position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: var(--gray); transition: color 0.3s;
            z-index: 2; background: none; border: none; font-size: 16px;
            padding: 8px; display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 50%;
        }
        .password-toggle:hover { color: var(--primary); background: rgba(139,69,19,0.05); }

        /* ✅ مربع تذكرني - تم إصلاحه */
        .remember-me {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
        }
        .remember-me input[type="checkbox"] {
            width: 20px; height: 20px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0;
        }
        .remember-me label {
            font-family: 'Cairo', sans-serif; color: var(--dark); font-size: 14px;
            cursor: pointer; user-select: none; font-weight: 500; line-height: 20px;
        }

        .submit-btn {
            width: 100%; padding: 14px; background: var(--gradient-1); color: white;
            border: none; border-radius: var(--radius-md); font-size: 17px;
            font-weight: 700; cursor: pointer; transition: all 0.3s ease;
            font-family: 'Cairo', 'El Messiri', sans-serif;
            letter-spacing: 0.8px; word-spacing: 2px;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(139,69,19,0.3); }
        .submit-btn.loading { pointer-events: none; opacity: 0.8; }
        .submit-btn.loading::after {
            content: ''; position: absolute; width: 20px; height: 20px;
            border: 2px solid white; border-top-color: transparent; border-radius: 50%;
            animation: spin 0.8s linear infinite; top: 50%; left: 50%;
            margin-top: -10px; margin-left: -10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-message, .success-message {
            font-family: 'Cairo', sans-serif; padding: 12px; border-radius: var(--radius-sm);
            margin-bottom: 20px; font-size: 14px; display: none; align-items: center; gap: 8px;
            letter-spacing: 0.2px;
        }
        .error-message { background: #FEE2E2; color: var(--red); }
        .success-message { background: #D1FAE5; color: var(--green); }
        .error-message.show { display: flex; }
        .success-message.show { display: flex; }

        @media (max-width: 600px) {
            .container { padding: 25px 18px; }
            .logo-text { font-size: 34px; }
            .input-wrapper input { padding: 12px 38px 12px 40px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo-icon"><i class="fas fa-feather-alt"></i></div>
            <h1 class="logo-text">أشعاري</h1>
            <p class="logo-subtitle">منصة الشعر العربي الأصيل</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">تسجيل الدخول</div>
            <div class="tab" onclick="switchTab('register')">مستخدم جديد</div>
        </div>

        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span id="successText"></span>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <form id="loginForm" class="form active" onsubmit="return false;">
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="loginEmail" placeholder="أدخل بريدك الإلكتروني" required autocomplete="email">
                </div>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" required autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)" tabindex="-1" aria-label="إظهار كلمة المرور">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <!-- ✅ تم تغيير onclick إلى onchange مباشر -->
            <div class="remember-me">
                <input type="checkbox" id="rememberMe" onchange="handleRememberMeChange()">
                <label for="rememberMe">تذكرني</label>
            </div>
            <button type="submit" class="submit-btn" id="loginBtn" onclick="handleLogin(event)">تسجيل الدخول</button>
        </form>

        <!-- نموذج التسجيل -->
        <form id="registerForm" class="form" onsubmit="return false;">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="registerUsername" placeholder="اختر اسم المستخدم" required autocomplete="username">
                </div>
            </div>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="registerEmail" placeholder="أدخل بريدك الإلكتروني" required autocomplete="email">
                </div>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="registerPassword" placeholder="أدخل كلمة المرور (6 أحرف على الأقل)" required minlength="6" autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('registerPassword', this)" tabindex="-1" aria-label="إظهار كلمة المرور">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="input-group">
                <label>تأكيد كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="registerConfirmPassword" placeholder="أعد إدخال كلمة المرور" required minlength="6" autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('registerConfirmPassword', this)" tabindex="-1" aria-label="إظهار كلمة المرور">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="submit-btn" id="registerBtn" onclick="handleRegister(event)">إنشاء حساب</button>
        </form>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCKbEAIcSnw70CqUflBVFuv7KUq1VMjgTA",
            authDomain: "pump-station-system.firebaseapp.com",
            databaseURL: "https://pump-station-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "pump-station-system",
            storageBucket: "pump-station-system.firebasestorage.app",
            messagingSenderId: "734880960614",
            appId: "1:734880960614:web:ef432e1bdce58aac181da7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        console.log('Login - Firebase ready');

        // ✅ عند فتح الصفحة - تحميل البيانات المحفوظة
        window.addEventListener('DOMContentLoaded', function() {
            loadSavedCredentials();
        });

        // ✅ تحميل بيانات تسجيل الدخول المحفوظة
        function loadSavedCredentials() {
            try {
                var saved = localStorage.getItem('savedCredentials');
                if (saved) {
                    saved = JSON.parse(saved);
                    document.getElementById('loginEmail').value = saved.email || '';
                    document.getElementById('loginPassword').value = saved.password || '';
                    document.getElementById('rememberMe').checked = true;
                    console.log('Credentials loaded from localStorage');
                }
            } catch(e) {
                console.error('Error loading credentials:', e);
            }
        }

        // ✅ حفظ بيانات تسجيل الدخول
        function saveCredentials(email, password) {
            try {
                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('savedCredentials', JSON.stringify({
                        email: email,
                        password: password
                    }));
                    console.log('Credentials saved to localStorage');
                } else {
                    localStorage.removeItem('savedCredentials');
                    console.log('Credentials removed from localStorage');
                }
            } catch(e) {
                console.error('Error saving credentials:', e);
            }
        }

        // ✅ حذف بيانات تسجيل الدخول (عند إلغاء تذكرني)
        function removeCredentials() {
            try {
                localStorage.removeItem('savedCredentials');
                console.log('Credentials removed');
            } catch(e) {
                console.error('Error removing credentials:', e);
            }
        }

        // ✅ معالج تغيير حالة تذكرني
        function handleRememberMeChange() {
            var checkbox = document.getElementById('rememberMe');
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;
            
            if (checkbox.checked) {
                // حفظ إذا كان هناك بيانات
                if (email && password) {
                    saveCredentials(email, password);
                }
            } else {
                // حذف البيانات المحفوظة
                removeCredentials();
            }
        }

        // ✅ تبديل التبويبات
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.form').forEach(function(f) { f.classList.remove('active'); });
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            hideMessages();
        }

        // ✅ زر العين
        function togglePassword(inputId, button) {
            var input = document.getElementById(inputId);
            var icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
                button.setAttribute('aria-label', 'إخفاء كلمة المرور');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
                button.setAttribute('aria-label', 'إظهار كلمة المرور');
            }
        }

        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
        }
        function showSuccess(message) {
            document.getElementById('successText').textContent = message;
            document.getElementById('successMessage').classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }
        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        // ✅ تسجيل الدخول
        async function handleLogin(e) {
            if (e) e.preventDefault();
            hideMessages();
            
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;
            var rememberMe = document.getElementById('rememberMe').checked;
            var loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }
            
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            try {
                var persistence = rememberMe ? 
                    firebase.auth.Auth.Persistence.LOCAL : 
                    firebase.auth.Auth.Persistence.SESSION;
                
                await auth.setPersistence(persistence);
                var userCredential = await auth.signInWithEmailAndPassword(email, password);
                var user = userCredential.user;
                
                console.log('Login successful:', user.uid);
                
                // ✅ حفظ بيانات الدخول إذا كان "تذكرني" مفعلاً
                saveCredentials(email, password);
                
                // جلب بيانات المستخدم
                var snapshot = await database.ref('users/' + user.uid).once('value');
                
                var userInfo = {
                    uid: user.uid,
                    email: user.email,
                    username: snapshot.exists() ? (snapshot.val().username || 'مستخدم') : 'مستخدم',
                    profileImage: snapshot.exists() ? (snapshot.val().profileImage || '') : '',
                    verified: snapshot.exists() ? (snapshot.val().verified || false) : false
                };
                
                try { localStorage.setItem('currentUser', JSON.stringify(userInfo)); } catch(e) {}
                
                showSuccess('تم تسجيل الدخول بنجاح!');
                setTimeout(function() { window.location.href = 'pages/home.html'; }, 1000);
                
            } catch (error) {
                console.error('Login error:', error.code);
                var msgs = {
                    'auth/invalid-email': 'صيغة البريد الإلكتروني غير صحيحة',
                    'auth/user-not-found': 'لا يوجد حساب بهذا البريد الإلكتروني',
                    'auth/wrong-password': 'كلمة المرور غير صحيحة',
                    'auth/invalid-credential': 'البريد الإلكتروني أو كلمة المرور غير صحيحة',
                    'auth/too-many-requests': 'محاولات كثيرة. الرجاء المحاولة لاحقاً',
                    'auth/operation-not-allowed': 'تسجيل الدخول غير مفعل'
                };
                showError(msgs[error.code] || 'حدث خطأ: ' + error.message);
            } finally {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        }

        // ✅ إنشاء حساب جديد
        async function handleRegister(e) {
            if (e) e.preventDefault();
            hideMessages();
            
            var username = document.getElementById('registerUsername').value.trim();
            var email = document.getElementById('registerEmail').value.trim();
            var password = document.getElementById('registerPassword').value;
            var confirmPassword = document.getElementById('registerConfirmPassword').value;
            var registerBtn = document.getElementById('registerBtn');
            
            if (!username || !email || !password) { showError('يرجى ملء جميع الحقول'); return; }
            if (username.length < 3) { showError('اسم المستخدم 3 أحرف على الأقل'); return; }
            if (password.length < 6) { showError('كلمة المرور 6 أحرف على الأقل'); return; }
            if (password !== confirmPassword) { showError('كلمات المرور غير متطابقة'); return; }
            
            registerBtn.classList.add('loading');
            registerBtn.disabled = true;
            
            try {
                var userCredential = await auth.createUserWithEmailAndPassword(email, password);
                var user = userCredential.user;
                console.log('Account created:', user.uid);
                
                await database.ref('users/' + user.uid).set({
                    username: username, email: email, profileImage: '',
                    verified: false, createdAt: new Date().toISOString()
                });
                
                showSuccess('تم إنشاء الحساب بنجاح!');
                setTimeout(function() {
                    switchTab('login');
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').value = '';
                }, 1500);
                
            } catch (error) {
                var msgs = {
                    'auth/email-already-in-use': 'البريد الإلكتروني مستخدم بالفعل',
                    'auth/invalid-email': 'صيغة البريد غير صحيحة',
                    'auth/weak-password': 'كلمة المرور ضعيفة'
                };
                showError(msgs[error.code] || 'حدث خطأ');
            } finally {
                registerBtn.classList.remove('loading');
                registerBtn.disabled = false;
            }
        }

        // ✅ دعم زر Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').classList.contains('active')) handleLogin(e);
                else if (document.getElementById('registerForm').classList.contains('active')) handleRegister(e);
            }
        });

        // ✅ جعل الدوال متاحة
        window.switchTab = switchTab;
        window.togglePassword = togglePassword;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.handleRememberMeChange = handleRememberMeChange;

        console.log('Login - Ready');
    </script>
</body>
                </html>
